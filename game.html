<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سريع الحروف - أونلاين</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --main-color: #6c5ce7; --sec-color: #a29bfe; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: var(--main-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; transition: 0.3s; }
        button:hover { background: var(--sec-color); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        #leaderboard { margin-top: 20px; width: 100%; border-collapse: collapse; }
        #leaderboard th, #leaderboard td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .hidden { display: none; }
        .timer { font-size: 24px; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup-screen" class="card">
        <h2>🎮 إنشاء غرفة جديدة</h2>
        <p>امسح الباركود للانضمام (لأكثر من 20 لاعب)</p>
        <div id="qrcode"></div>
        <input type="text" id="player-name" placeholder="أدخل اسمك هنا...">
        <button onclick="startGame()">ابدأ اللعب الآن!</button>
    </div>

    <div id="game-screen" class="card hidden">
        <h2 id="current-letter">الحرف المطلوب: (أ)</h2>
        <div class="grid-inputs">
            <input type="text" class="ans" placeholder="اسم">
            <input type="text" class="ans" placeholder="نبات">
            <input type="text" class="ans" placeholder="جماد">
            <input type="text" class="ans" placeholder="بلاد">
            <input type="text" class="ans" placeholder="حيوان">
        </div>
        <button id="finish-btn" onclick="finishGame()">🔥 انتهيت! (إيقاف الجميع)</button>
        <p id="freeze-msg" class="timer hidden">تم إيقاف الوقت! جاري التصحيح...</p>
    </div>

    <div id="result-screen" class="card hidden">
        <h2>🏆 لوحة الصدارة</h2>
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>المركز</th>
                    <th>الاسم</th>
                    <th>النقاط</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <br>
        <button onclick="location.reload()">جولة جديدة</button>
    </div>

    <script>
        // توليد الباركود تلقائياً (رابط وهمي للتوضيح)
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 150, height: 150
        });

        function startGame() {
            const name = document.getElementById('player-name').value;
            if(!name) return alert("الرجاء كتابة اسمك!");
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }

        function finishGame() {
            document.getElementById('finish-btn').classList.add('hidden');
            document.getElementById('freeze-msg').classList.remove('hidden');
            
            // محاكاة نظام التصحيح الذي طلبته
            setTimeout(showResults, 2000);
        }

        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // محاكاة بيانات 20 لاعب ونقاطهم (بناءً على القوانين: 10 للفريد، 5 للمكرر)
            const mockPlayers = [
                {name: document.getElementById('player-name').value, score: 45},
                {name: "محمد", score: 50}, {name: "سارة", score: 35},
                {name: "فهد", score: 20}, {name: "نورة", score: 10}
            ].sort((a, b) => b.score - a.score);

            const tbody = document.getElementById('leaderboard-body');
            mockPlayers.forEach((p, index) => {
                tbody.innerHTML += `<tr><td>${index+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
            });
        }
    </script>
</body>
</html>
